<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="t d"><title id="t">Push button breadboard wiring layout</title><desc id="d">Top-down layout showing a Pico with GP14 connected to one side of a button, the opposite side connected to ground, and GP15 connected through a 220 ohm resistor to an LED and ground.</desc><rect width="1200" height="800" rx="40" fill="#eff6ff"/><text x="600" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="34" font-weight="700" fill="#0f172a">Push Button Breadboard Layout</text><rect x="65" y="95" width="1070" height="625" rx="38" fill="#fff" stroke="#94a3b8" stroke-width="7"/><rect x="115" y="155" width="970" height="500" rx="26" fill="#f8fafc" stroke="#cbd5e1" stroke-width="4"/><path d="M140 270h920M140 545h920" stroke="#dbeafe" stroke-width="11"/><path d="M140 350h920M140 455h920" stroke="#e2e8f0" stroke-width="8"/><rect x="225" y="175" width="255" height="460" rx="27" fill="#1d4ed8"/><text x="352" y="420" text-anchor="middle" font-family="Arial,sans-serif" font-size="34" font-weight="700" fill="#fff">PICO</text><circle cx="465" cy="315" r="10" fill="#fbbf24"/><circle cx="465" cy="400" r="10" fill="#fbbf24"/><circle cx="465" cy="530" r="10" fill="#fbbf24"/><text x="315" y="305" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#fff">GP14 input</text><text x="315" y="390" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#fff">GP15 output</text><text x="350" y="540" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#fff">GND</text><path d="M475 315h175" stroke="#2563eb" stroke-width="12"/><rect x="650" y="275" width="170" height="105" rx="20" fill="#334155"/><rect x="685" y="240" width="100" height="70" rx="17" fill="#fb923c"/><text x="735" y="415" text-anchor="middle" font-family="Arial,sans-serif" font-size="21" font-weight="700" fill="#0f172a">Button bridges gap</text><path d="M820 315h95v215H475" stroke="#0f172a" stroke-width="12" fill="none"/><path d="M475 400h190" stroke="#ea580c" stroke-width="12"/><rect x="665" y="380" width="165" height="40" rx="18" fill="#e2e8f0" stroke="#475569" stroke-width="4"/><text x="747" y="365" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="700" fill="#9a3412">220Ω</text><path d="M830 400h110v-45" stroke="#ea580c" stroke-width="12" fill="none"/><path d="M910 355v-78a26 26 0 0152 0v78" fill="#fb923c" stroke="#9a3412" stroke-width="7"/><path d="M962 355v175" stroke="#0f172a" stroke-width="12"/><text x="936" y="245" text-anchor="middle" font-family="Arial,sans-serif" font-size="19" font-weight="700" fill="#9a3412">Anode +</text><text x="1000" y="385" font-family="Arial,sans-serif" font-size="19" font-weight="700" fill="#0f172a">Cathode −</text><text x="600" y="760" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" fill="#334155">GP14 → button → GND | GP15 → 220Ω → LED → GND</text></svg>
