<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="t d"><title id="t">Pico push button input and LED output circuit</title><desc id="d">Schematic showing GP14 with an internal pull-up and button to ground, plus GP15 through a 220 ohm resistor and LED to ground.</desc><rect width="1200" height="800" rx="40" fill="#f8fafc"/><text x="600" y="64" text-anchor="middle" font-family="Arial,sans-serif" font-size="34" font-weight="700" fill="#0f172a">Digital Input Controls an LED</text><rect x="65" y="135" width="270" height="535" rx="30" fill="#1d4ed8"/><text x="200" y="195" text-anchor="middle" font-family="Arial,sans-serif" font-size="27" font-weight="700" fill="#fff">Raspberry Pi Pico</text><rect x="100" y="270" width="200" height="55" rx="18" fill="#dbeafe"/><text x="200" y="306" text-anchor="middle" font-family="Arial,sans-serif" font-size="23" font-weight="700" fill="#1e3a8a">GPIO 14 INPUT</text><rect x="100" y="440" width="200" height="55" rx="18" fill="#dbeafe"/><text x="200" y="476" text-anchor="middle" font-family="Arial,sans-serif" font-size="23" font-weight="700" fill="#1e3a8a">GPIO 15 OUTPUT</text><rect x="100" y="565" width="200" height="55" rx="18" fill="#dbeafe"/><text x="200" y="601" text-anchor="middle" font-family="Arial,sans-serif" font-size="23" font-weight="700" fill="#1e3a8a">GND</text><path d="M335 297h205" stroke="#2563eb" stroke-width="12"/><path d="M430 297v-95" stroke="#2563eb" stroke-width="9"/><path d="M430 202l-30-25 60-35-60-35 60-35" fill="none" stroke="#334155" stroke-width="7"/><rect x="475" y="105" width="225" height="48" rx="18" fill="#dbeafe"/><text x="587" y="137" text-anchor="middle" font-family="Arial,sans-serif" font-size="21" font-weight="700" fill="#1e3a8a">Internal pull-up to 3.3V</text><path d="M540 297h80m0-32v64m75-64v64m0-32h110v295H335" stroke="#0f172a" stroke-width="10" fill="none"/><path d="M620 245l75 52" stroke="#0f172a" stroke-width="8"/><rect x="590" y="340" width="150" height="44" rx="17" fill="#ffedd5"/><text x="665" y="369" text-anchor="middle" font-family="Arial,sans-serif" font-size="21" font-weight="700" fill="#9a3412">Push button</text><path d="M335 467h180" stroke="#ea580c" stroke-width="12"/><path d="M515 467l22-32 40 64 40-64 40 64 40-64 22 32" fill="none" stroke="#334155" stroke-width="8"/><rect x="545" y="385" width="145" height="45" rx="17" fill="#ffedd5"/><text x="617" y="415" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#9a3412">220Ω</text><path d="M719 467h75" stroke="#ea580c" stroke-width="12"/><path d="M794 410v114l100-57z" fill="#fb923c" stroke="#9a3412" stroke-width="7"/><path d="M910 410v114" stroke="#334155" stroke-width="9"/><path d="M894 467h100v125H335" stroke="#0f172a" stroke-width="12" fill="none"/><text x="850" y="570" text-anchor="middle" font-family="Arial,sans-serif" font-size="21" font-weight="700" fill="#9a3412">LED anode (+)</text><text x="980" y="545" text-anchor="middle" font-family="Arial,sans-serif" font-size="21" font-weight="700" fill="#0f172a">Cathode (−)</text><rect x="410" y="690" width="380" height="55" rx="20" fill="#e2e8f0"/><text x="600" y="726" text-anchor="middle" font-family="Arial,sans-serif" font-size="23" font-weight="700" fill="#0f172a">Shared ground (GND)</text></svg>
