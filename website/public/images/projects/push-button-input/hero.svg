<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="t d"><title id="t">Raspberry Pi Pico push button project</title><desc id="d">Original blue and orange illustration of a Pico reading a push button on GPIO 14 and lighting an LED on GPIO 15.</desc><rect width="1200" height="900" rx="48" fill="#eff6ff"/><circle cx="1010" cy="145" r="230" fill="#ffedd5"/><rect x="105" y="125" width="990" height="650" rx="42" fill="#fff" stroke="#bfdbfe" stroke-width="8"/><rect x="255" y="210" width="260" height="460" rx="28" fill="#1d4ed8"/><rect x="320" y="250" width="130" height="95" rx="12" fill="#0f172a"/><text x="385" y="475" text-anchor="middle" font-family="Arial,sans-serif" font-size="38" font-weight="700" fill="#fff">PICO</text><path d="M500 370h175" stroke="#2563eb" stroke-width="13"/><rect x="675" y="315" width="160" height="110" rx="22" fill="#334155"/><rect x="705" y="275" width="100" height="75" rx="18" fill="#fb923c" stroke="#9a3412" stroke-width="7"/><text x="755" y="470" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="700" fill="#0f172a">BUTTON</text><path d="M835 370h95v185H500" stroke="#0f172a" stroke-width="13" fill="none"/><path d="M500 520h170" stroke="#ea580c" stroke-width="13"/><rect x="670" y="500" width="145" height="40" rx="19" fill="#e2e8f0" stroke="#475569" stroke-width="4"/><path d="M815 520h85v-40" stroke="#ea580c" stroke-width="13" fill="none"/><path d="M870 480v-80a28 28 0 0156 0v80" fill="#fb923c" stroke="#9a3412" stroke-width="7"/><circle cx="898" cy="400" r="86" fill="#fb923c" opacity=".2"/><path d="M926 480v75" stroke="#0f172a" stroke-width="13"/><rect x="190" y="715" width="820" height="82" rx="28" fill="#dbeafe"/><text x="600" y="766" text-anchor="middle" font-family="Arial,sans-serif" font-size="30" font-weight="700" fill="#1e3a8a">Press the button → turn on the LED</text></svg>
