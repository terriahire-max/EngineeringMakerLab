<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Raspberry Pi Pico LED breadboard layout</title>
  <desc id="desc">A simplified top-down breadboard illustration showing GPIO 15 wired through a 220 ohm resistor to an LED anode in a separate row from its cathode, which returns to Pico ground.</desc>
  <rect width="1200" height="800" rx="40" fill="#eff6ff"/>
  <text x="600" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">Breadboard Wiring Layout</text>
  <rect x="70" y="105" width="1060" height="610" rx="38" fill="#fff" stroke="#94a3b8" stroke-width="7"/>
  <rect x="110" y="170" width="980" height="475" rx="24" fill="#f8fafc" stroke="#cbd5e1" stroke-width="4"/>
  <path d="M130 260h940M130 535h940" stroke="#bfdbfe" stroke-width="12"/>
  <path d="M130 330h940M130 455h940" stroke="#e2e8f0" stroke-width="8"/>
  <g fill="#94a3b8">
    <circle cx="160" cy="330" r="6"/><circle cx="205" cy="330" r="6"/><circle cx="250" cy="330" r="6"/><circle cx="160" cy="455" r="6"/><circle cx="205" cy="455" r="6"/><circle cx="250" cy="455" r="6"/>
    <circle cx="690" cy="330" r="6"/><circle cx="735" cy="330" r="6"/><circle cx="780" cy="330" r="6"/><circle cx="825" cy="330" r="6"/><circle cx="870" cy="330" r="6"/>
    <circle cx="690" cy="455" r="6"/><circle cx="735" cy="455" r="6"/><circle cx="780" cy="455" r="6"/><circle cx="825" cy="455" r="6"/><circle cx="870" cy="455" r="6"/>
  </g>
  <rect x="275" y="190" width="260" height="445" rx="26" fill="#1d4ed8"/>
  <rect x="340" y="225" width="130" height="92" rx="12" fill="#0f172a"/>
  <text x="405" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#fff">PICO</text>
  <circle cx="520" cy="345" r="10" fill="#fbbf24"/><circle cx="520" cy="500" r="10" fill="#fbbf24"/>
  <rect x="310" y="322" width="145" height="48" rx="16" fill="#dbeafe"/><text x="382" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1e3a8a">GPIO 15</text>
  <rect x="350" y="478" width="105" height="48" rx="16" fill="#dbeafe"/><text x="402" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1e3a8a">GND</text>
  <path d="M530 345h140" stroke="#ea580c" stroke-width="12" fill="none"/>
  <rect x="670" y="324" width="190" height="42" rx="19" fill="#e2e8f0" stroke="#475569" stroke-width="4"/>
  <path d="M704 324v42m30-42v42m85-42v42" stroke="#92400e" stroke-width="9"/>
  <rect x="695" y="275" width="140" height="40" rx="16" fill="#ffedd5"/><text x="765" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#9a3412">220Ω series</text>
  <path d="M860 345h80" stroke="#ea580c" stroke-width="12"/>
  <path d="M905 345v-92a30 30 0 0160 0v92" fill="#fb923c" stroke="#9a3412" stroke-width="7"/>
  <circle cx="935" cy="250" r="68" fill="#fb923c" opacity=".18"/>
  <path d="M965 345v155H530" stroke="#0f172a" stroke-width="12" fill="none" stroke-linejoin="round"/>
  <rect x="865" y="385" width="145" height="42" rx="16" fill="#ffedd5"/><text x="937" y="413" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#9a3412">Anode (+)</text>
  <rect x="880" y="450" width="150" height="42" rx="16" fill="#e2e8f0"/><text x="955" y="478" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">Cathode (−)</text>
  <path d="M850 385h170" stroke="#64748b" stroke-width="3" stroke-dasharray="8 7"/>
  <text x="935" y="615" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" fill="#334155">LED legs occupy separate rows</text>
  <text x="600" y="760" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" fill="#334155">Orange jumper: GPIO 15 path • Dark jumper: shared GND return</text>
</svg>
