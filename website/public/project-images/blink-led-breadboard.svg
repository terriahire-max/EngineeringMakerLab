<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="t d"><title id="t">Blink LED breadboard wiring layout</title><desc id="d">Simplified top-down breadboard layout with Pico GPIO 15 connected through a resistor to the LED anode and the cathode connected to ground.</desc><rect width="1200" height="800" rx="40" fill="#eff6ff"/><rect x="90" y="110" width="1020" height="580" rx="36" fill="white" stroke="#94a3b8" stroke-width="7"/><g fill="#cbd5e1"><path d="M150 210h900v12H150zm0 350h900v12H150z"/><path d="M150 300h900v10H150zm0 170h900v10H150z"/></g><rect x="230" y="190" width="250" height="420" rx="24" fill="#2563eb"/><text x="355" y="410" text-anchor="middle" font-family="Arial" font-size="34" font-weight="700" fill="white">PICO</text><circle cx="460" cy="325" r="10" fill="#fbbf24"/><text x="440" y="290" font-family="Arial" font-size="24" font-weight="700" fill="#1e293b">GP15</text><circle cx="460" cy="505" r="10" fill="#fbbf24"/><text x="405" y="550" font-family="Arial" font-size="24" font-weight="700" fill="#1e293b">GND</text><path d="M470 325H650" stroke="#ef4444" stroke-width="12" fill="none"/><rect x="650" y="304" width="180" height="42" rx="20" fill="#e2e8f0" stroke="#475569" stroke-width="4"/><text x="740" y="285" text-anchor="middle" font-family="Arial" font-size="22" fill="#334155">220 ohm</text><path d="M830 325h95" stroke="#ef4444" stroke-width="12"/><path d="M885 325v-82a26 26 0 0152 0v82" fill="#fb923c" stroke="#c2410c" stroke-width="7"/><text x="910" y="180" text-anchor="middle" font-family="Arial" font-size="21" fill="#334155">LED</text><path d="M937 325v180H470" stroke="#0f172a" stroke-width="12" fill="none"/><text x="600" y="750" text-anchor="middle" font-family="Arial" font-size="28" fill="#334155">GP15 → 220 ohm resistor → LED anode | LED cathode → GND</text></svg>
