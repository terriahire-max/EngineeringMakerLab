<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="t d"><title id="t">Blink LED circuit diagram</title><desc id="d">GPIO 15 connects to a 220 ohm resistor, the LED anode and cathode, then Pico ground.</desc><rect width="1200" height="800" rx="40" fill="#fff"/><text x="600" y="90" text-anchor="middle" font-family="Arial" font-size="38" font-weight="700" fill="#0f172a">Raspberry Pi Pico LED Circuit</text><rect x="90" y="210" width="240" height="360" rx="28" fill="#2563eb"/><text x="210" y="370" text-anchor="middle" font-family="Arial" font-size="30" font-weight="700" fill="white">PICO</text><circle cx="330" cy="310" r="12" fill="#fbbf24"/><text x="210" y="290" text-anchor="middle" font-family="Arial" font-size="25" fill="white">GPIO pin: GP15</text><circle cx="330" cy="500" r="12" fill="#fbbf24"/><text x="210" y="535" text-anchor="middle" font-family="Arial" font-size="25" fill="white">GND</text><path d="M342 310h145" stroke="#dc2626" stroke-width="12"/><path d="M487 310l25-35 45 70 45-70 45 70 45-70 25 35" fill="none" stroke="#334155" stroke-width="8"/><text x="602" y="240" text-anchor="middle" font-family="Arial" font-size="26" font-weight="700" fill="#334155">220 ohm resistor</text><path d="M717 310h100" stroke="#dc2626" stroke-width="12"/><path d="M817 245v130l115-65z" fill="#fb923c" stroke="#9a3412" stroke-width="7"/><path d="M945 245v130" stroke="#334155" stroke-width="9"/><path d="M932 310h100v190H342" stroke="#0f172a" stroke-width="12" fill="none"/><text x="850" y="420" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700" fill="#9a3412">LED anode (+)</text><text x="995" y="420" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700" fill="#334155">LED cathode (-)</text><text x="685" y="545" text-anchor="middle" font-family="Arial" font-size="26" font-weight="700" fill="#0f172a">Ground connection (GND)</text><text x="600" y="700" text-anchor="middle" font-family="Arial" font-size="25" fill="#475569">Current flows from GP15 through the resistor and LED to ground.</text></svg>
